<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senzing Electron Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 24px;
      line-height: 1.5;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    #version-display {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 24px;
      padding: 8px 12px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }

    .section {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: #222;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row > div {
      flex: 1;
    }

    button {
      background: #4a90d9;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #357abd;
    }

    button:active {
      background: #2a6099;
    }

    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      min-height: 1.5em;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.error {
      background: #fce4ec;
      color: #c62828;
    }

    .results {
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .entity-card {
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 12px;
      margin-top: 10px;
    }

    .entity-id {
      font-weight: 600;
      color: #4a90d9;
    }

    .muted {
      color: #999;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>Senzing Entity Resolution</h1>
  <div id="version-display">Loading version...</div>

  <div class="section">
    <h2>Load Truthset Data</h2>
    <p class="muted">Download and load the Senzing truthset (customers, watchlist, reference) from GitHub.</p>
    <button id="load-truthset-btn" type="button">Load Truthset</button>
    <div id="load-progress" class="status"></div>
  </div>

  <div class="section">
    <h2>Add Record</h2>
    <form id="add-record-form">
      <div class="form-row">
        <div>
          <label for="data-source">Data Source</label>
          <input type="text" id="data-source" value="CUSTOMERS" placeholder="CUSTOMERS">
        </div>
        <div>
          <label for="record-id">Record ID</label>
          <input type="text" id="record-id" placeholder="1001">
        </div>
      </div>
      <label for="record-name">Full Name</label>
      <input type="text" id="record-name" placeholder="Robert Smith">
      <div class="form-row">
        <div>
          <label for="record-dob">Date of Birth</label>
          <input type="text" id="record-dob" placeholder="1985-02-15">
        </div>
        <div>
          <label for="record-address">Address</label>
          <input type="text" id="record-address" placeholder="123 Main St, Las Vegas, NV 89101">
        </div>
      </div>
      <button type="submit">Add Record</button>
      <div id="add-record-status" class="status"></div>
    </form>
  </div>

  <div class="section">
    <h2>Search by Attributes</h2>
    <form id="search-form">
      <label for="search-name">Name</label>
      <input type="text" id="search-name" placeholder="Robert Smith">
      <button type="submit">Search</button>
      <div id="search-results" class="results"></div>
    </form>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
