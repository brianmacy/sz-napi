name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build configtool native addon (no Senzing runtime needed)
  # ---------------------------------------------------------------------------
  build-configtool:
    name: Build configtool (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout sz-napi
        uses: actions/checkout@v6
        with:
          path: sz-napi

      - name: Checkout sz-rust-sdk
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk
          path: sz-rust-sdk

      - name: Checkout sz-rust-sdk-configtool
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk-configtool
          path: sz-rust-sdk-configtool

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: sz-napi
        run: npm install

      - name: Build configtool
        working-directory: sz-napi/packages/configtool
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: configtool-${{ matrix.target }}
          path: sz-napi/packages/configtool/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build SDK native addon — Linux (requires Senzing runtime for linking)
  # Amazon Linux 2023 container provides yum access to Senzing packages
  # ---------------------------------------------------------------------------
  build-sdk-linux:
    name: Build SDK (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    container:
      image: amazonlinux:2023
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Install system dependencies
        run: |
          yum install -y git tar gzip gcc gcc-c++ make openssl-devel \
            findutils xz sqlite-devel

      - name: Checkout sz-napi
        uses: actions/checkout@v6
        with:
          path: sz-napi

      - name: Checkout sz-rust-sdk
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk
          path: sz-rust-sdk

      - name: Checkout sz-rust-sdk-configtool
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk-configtool
          path: sz-rust-sdk-configtool

      - name: Install Senzing runtime
        env:
          SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
        run: |
          yum install -y https://senzing-production-yum.s3.amazonaws.com/senzingrepo-2.0.1-1.noarch.rpm
          yum install -y senzingsdk-runtime

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: sz-napi
        run: npm install

      - name: Build SDK
        working-directory: sz-napi/packages/sdk
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdk-${{ matrix.target }}
          path: sz-napi/packages/sdk/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build SDK native addon — macOS and Windows
  # macOS: Senzing runtime via Homebrew (rpath embedded, no DYLD_LIBRARY_PATH)
  # Windows: Senzing runtime via Scoop
  # ---------------------------------------------------------------------------
  build-sdk-host:
    name: Build SDK (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout sz-napi
        uses: actions/checkout@v6
        with:
          path: sz-napi

      - name: Checkout sz-rust-sdk
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk
          path: sz-rust-sdk

      - name: Checkout sz-rust-sdk-configtool
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk-configtool
          path: sz-rust-sdk-configtool

      - name: Install Senzing runtime (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_SENZING_EULA_ACCEPTED: "yes"
        run: brew install --cask brianmacy/senzingsdk-runtime-unofficial/senzingsdk-runtime-unofficial

      - name: Install Scoop and Senzing runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SENZING_EULA_ACCEPTED: "yes"
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          scoop bucket add senzing https://github.com/brianmacy/scoop-senzingsdk-runtime-unofficial
          scoop install senzingsdk-runtime-unofficial

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: sz-napi
        run: npm install

      - name: Setup MSVC tools (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Sz.lib import library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $senzingLib = "$env:USERPROFILE\scoop\apps\senzingsdk-runtime-unofficial\current\er\lib"
          # Generate .def file from DLL exports
          $exports = & dumpbin /exports "$senzingLib\Sz.dll" | Select-String '^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+(\S+)' | ForEach-Object { $_.Matches.Groups[1].Value }
          $defContent = "LIBRARY Sz`nEXPORTS`n"
          foreach ($exp in $exports) { $defContent += "  $exp`n" }
          Set-Content -Path "$senzingLib\Sz.def" -Value $defContent
          # Generate import library
          & lib /def:"$senzingLib\Sz.def" /out:"$senzingLib\Sz.lib" /machine:x64
          Write-Host "Generated Sz.lib with $($exports.Count) exports"

      - name: Build SDK (macOS)
        if: runner.os == 'macOS'
        working-directory: sz-napi/packages/sdk
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build SDK (Windows)
        if: runner.os == 'Windows'
        working-directory: sz-napi/packages/sdk
        shell: pwsh
        run: |
          $env:SENZING_LIB_PATH = "$env:USERPROFILE\scoop\apps\senzingsdk-runtime-unofficial\current\er\lib"
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdk-${{ matrix.target }}
          path: sz-napi/packages/sdk/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach prebuilt .node artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-configtool, build-sdk-linux, build-sdk-host]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Rename artifacts for release
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for file in "$dir"*.node; do
              [ -f "$file" ] || continue
              base=$(basename "$file")
              cp "$file" "release-assets/${name}-${base}"
            done
          done
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
