name: Security Audit

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --package-lock-only

      - name: Run npm audit
        run: npm audit --audit-level=high

  vet:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Clone sibling path dependencies
      run: |
        git clone --depth 1 https://github.com/brianmacy/sz-rust-sdk.git ../sz-rust-sdk
        git clone --depth 1 https://github.com/brianmacy/sz-rust-sdk-configtool.git ../sz-rust-sdk-configtool
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - run: cargo install cargo-vet --locked
    - run: cargo vet --locked
