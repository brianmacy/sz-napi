name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Cargo checks (fast validation, Linux only)
  # ---------------------------------------------------------------------------
  cargo-check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sz-napi
        uses: actions/checkout@v6
        with:
          path: sz-napi

      - name: Checkout sz-rust-sdk
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk
          path: sz-rust-sdk

      - name: Checkout sz-rust-sdk-configtool
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk-configtool
          path: sz-rust-sdk-configtool

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo clippy
        working-directory: sz-napi
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo fmt check
        working-directory: sz-napi
        run: |
          cargo fmt -p senzing-sdk-napi --check
          cargo fmt -p senzing-configtool-napi --check

  # ---------------------------------------------------------------------------
  # Build configtool native addon (no Senzing runtime needed)
  # ---------------------------------------------------------------------------
  build-configtool:
    name: Build configtool (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout sz-napi
        uses: actions/checkout@v6
        with:
          path: sz-napi

      - name: Checkout sz-rust-sdk
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk
          path: sz-rust-sdk

      - name: Checkout sz-rust-sdk-configtool
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk-configtool
          path: sz-rust-sdk-configtool

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: sz-napi
        run: npm install

      - name: Build configtool
        working-directory: sz-napi/packages/configtool
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: configtool-${{ matrix.target }}
          path: sz-napi/packages/configtool/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build SDK native addon (requires Senzing runtime for linking)
  # Amazon Linux 2023 is required for Senzing yum packages
  # ---------------------------------------------------------------------------
  build-sdk:
    name: Build SDK (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    container:
      image: amazonlinux:2023
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Install system dependencies
        run: |
          yum install -y git tar gzip gcc gcc-c++ make openssl-devel \
            findutils xz sqlite-devel

      - name: Checkout sz-napi
        uses: actions/checkout@v6
        with:
          path: sz-napi

      - name: Checkout sz-rust-sdk
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk
          path: sz-rust-sdk

      - name: Checkout sz-rust-sdk-configtool
        uses: actions/checkout@v6
        with:
          repository: brianmacy/sz-rust-sdk-configtool
          path: sz-rust-sdk-configtool

      - name: Install Senzing runtime
        env:
          SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
        run: |
          yum install -y https://senzing-production-yum.s3.amazonaws.com/senzingrepo-2.0.1-1.noarch.rpm
          yum install -y senzingsdk-runtime

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: sz-napi
        run: npm install

      - name: Build SDK
        working-directory: sz-napi/packages/sdk
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdk-${{ matrix.target }}
          path: sz-napi/packages/sdk/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Test configtool (pure-Rust, no external runtime needed)
  # ---------------------------------------------------------------------------
  test-configtool:
    name: Test configtool (${{ matrix.target }})
    needs: build-configtool
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout sz-napi
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download configtool artifact
        uses: actions/download-artifact@v8
        with:
          name: configtool-${{ matrix.target }}
          path: packages/configtool/

      - name: Run configtool tests
        working-directory: packages/configtool
        run: npx vitest run

      - name: Run configtool-usage example
        run: |
          cd examples/configtool-usage
          npm install
          npm start -- ../../packages/configtool/__tests__/fixtures/test-config.json

      - name: Install code-snippets dependencies
        run: |
          cd code-snippets
          npm install

      - name: Run configtool code snippets
        run: |
          npx tsx code-snippets/configtool/basic-usage/index.ts packages/configtool/__tests__/fixtures/test-config.json
          npx tsx code-snippets/configtool/process-script/index.ts packages/configtool/__tests__/fixtures/test-config.json

  # ---------------------------------------------------------------------------
  # Test tRPC + Electron packages (pure TypeScript, no runtime needed)
  # ---------------------------------------------------------------------------
  test-trpc:
    name: Test tRPC & Electron
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sz-napi
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tRPC unit tests
        working-directory: packages/trpc
        run: npx vitest run

      - name: Run Electron unit tests
        working-directory: packages/electron
        run: npx vitest run

  # ---------------------------------------------------------------------------
  # Test SDK (requires Senzing runtime -- Linux x64 only for now)
  # ---------------------------------------------------------------------------
  test-sdk:
    name: Test SDK (Linux x64)
    needs: [build-sdk, build-configtool]
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023
    steps:
      - name: Install system dependencies
        run: yum install -y git tar gzip findutils sqlite

      - name: Checkout sz-napi
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download SDK artifact
        uses: actions/download-artifact@v8
        with:
          name: sdk-x86_64-unknown-linux-gnu
          path: packages/sdk/

      - name: Download configtool artifact
        uses: actions/download-artifact@v8
        with:
          name: configtool-x86_64-unknown-linux-gnu
          path: packages/configtool/

      - name: Install Senzing runtime
        env:
          SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
        run: |
          yum install -y https://senzing-production-yum.s3.amazonaws.com/senzingrepo-2.0.1-1.noarch.rpm
          yum install -y senzingsdk-runtime senzingsdk-setup

      - name: Initialize Senzing SQLite database
        run: |
          sqlite3 /tmp/senzing-test.db < /opt/senzing/er/resources/schema/szcore-schema-sqlite-create.sql

      - name: Run SDK tests
        working-directory: packages/sdk
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
          SENZING_SETTINGS: >-
            {
              "PIPELINE": {
                "CONFIGPATH": "/opt/senzing/er/resources/templates",
                "RESOURCEPATH": "/opt/senzing/er/resources",
                "SUPPORTPATH": "/opt/senzing/data"
              },
              "SQL": {
                "CONNECTION": "sqlite3://na:na@/tmp/senzing-test.db"
              }
            }
        run: npx vitest run

      - name: Run tRPC integration tests
        working-directory: packages/trpc
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: npx vitest run __tests__/integration.test.ts

      - name: Install tsx for examples
        run: npm install -g tsx

      - name: Run basic-sdk-usage example
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          cd examples/basic-sdk-usage
          npm install
          npm start

      - name: Run config-management example
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          cd examples/config-management
          npm install
          npm start

      - name: Run configtool-usage example
        run: |
          cd examples/configtool-usage
          npm install
          npm start -- ../../packages/configtool/__tests__/fixtures/test-config.json

      - name: Install code-snippets dependencies
        run: |
          cd code-snippets
          npm install

      - name: Run information code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/information/get-version/index.ts
          npx tsx code-snippets/information/get-license/index.ts
          npx tsx code-snippets/information/check-datastore-performance/index.ts

      - name: Run initialization code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/initialization/environment-and-hubs/index.ts
          npx tsx code-snippets/initialization/engine-priming/index.ts
          npx tsx code-snippets/initialization/purge-repository/index.ts
          npx tsx code-snippets/initialization/lifecycle-patterns/index.ts

      - name: Run configuration code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/configuration/init-default-config/index.ts
          npx tsx code-snippets/configuration/register-data-sources/index.ts

      - name: Run loading code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/loading/load-records/index.ts
          npx tsx code-snippets/loading/load-with-info/index.ts

      - name: Run searching code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/searching/search-records/index.ts
          npx tsx code-snippets/searching/why-search/index.ts

      - name: Run deleting code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/deleting/delete-records/index.ts
          npx tsx code-snippets/deleting/delete-loop/index.ts

      - name: Run redo code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/redo/redo-continuous/index.ts
          npx tsx code-snippets/redo/load-with-redo/index.ts
          npx tsx code-snippets/redo/redo-with-info/index.ts

      - name: Run error-handling code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/error-handling/error-inspection/index.ts
          npx tsx code-snippets/error-handling/retry-with-backoff/index.ts

      - name: Run stewardship code snippets
        env:
          LD_LIBRARY_PATH: /opt/senzing/er/lib
        run: |
          npx tsx code-snippets/stewardship/force-resolve/index.ts
          npx tsx code-snippets/stewardship/force-unresolve/index.ts
